<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary - Safia Nabizada's Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f0efff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .box {
            width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .image-container {
            width: 100%;
            height: 200px;
            background-color: #5b5ee7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            padding: 30px;
            text-align: center;
        }
        .text {
            font-size: 24px;
            font-weight: bold;
            color: #1e2649;
            margin-bottom: 15px;
        }

        .text1 {
            font-size: 15px;
            color: #8b8cb1;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .plan-box {
            background-color: #f6f8ff;
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .plan-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-icon {
            width: 40px;
            height: 40px;
            background-color: #dcdfff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .plan-text h3 {
            font-size: 15px;
            color: #1e2649;
            margin-bottom: 3px;
        }

        .plan-text p {
            font-size: 13px;            color: #8b8cb1;
        }

        .change-link {
            color: #8b8cb1;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }

        .change-link:hover {
            color: #1e2649;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background-color: #8265d9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(130, 101, 217, 0.3);
            transition: background-color 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            background-color: #5a42b9;
        }

        .btn-secondary {
            color: #8b8cb1;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }

        .btn-secondary:hover {
            color: #1e2649;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="image-container">           
            <img class="image" src="image.jpg" alt="Music Illustration">
        </div>
        
        <div class="content">
            <p class="text">Order Summary</p>
            
            <p class="text1">
                You can now listen to millions of songs,<br>
                audiobooks, and podcasts on any device<br>
                anywhere you like!
            </p>

            <div class="plan-box">
                <div class="plan-info">
                    <div class="music-icon">🎵</div>
                    <div class="plan-text">
                        <h3>Annual Plan</h3>
                        <p>$59.99/year</p>
                    </div>
                </div>
                <a href="#" class="change-link">Change</a>
            </div>

            <button class="btn-primary">Proceed to Payment</button>
            
            <a href="#" class="btn-secondary">Cancel Order</a>
        </div>
    </div>
</body>
</html>
